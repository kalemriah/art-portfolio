<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Kalem Wallace</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/jpeg" href="/images/004.jpg">
  <style>
    .contact-card {
      display: flex;
      flex-direction: column;
      min-height: unset;
      gap: 20px;
    }
    .contact-card h1 {
      margin: 0;
    }
    .contact-body {
      display: flex;
      gap: 30px;
      align-items: center;
    }
    .contact-photo {
      flex: 0 0 auto;
      width: 200px;
      height: 260px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .contact-links-right {
      flex: 1;
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .contact-links-right li a {
      color: #B9B6B6;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 1px;
      transition: color 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .contact-links-right li a:hover {
      color: #6DBF76;
    }
    .contact-links-right li a i {
      color: #6DBF76;
      width: 18px;
      flex-shrink: 0;
    }
    @media (max-width: 480px) {
      .contact-body { flex-direction: column; }
      .contact-photo { width: 100%; height: auto; }
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/gallery">Gallery</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <section>
    <div class="card1 contact-card">
      <h1>Let's Connect</h1>
      <div class="contact-body">
        <img class="contact-photo" src="images/hello.jpg" alt="Kalem Wallace" />
        <ul class="contact-links-right">
          <li><a href="mailto:kalemriah361@gmail.com"><i class="fa-solid fa-envelope"></i> kalemriah361@gmail.com</a></li>
          <li><a href="https://www.linkedin.com/in/kalem-wallace-3b499a256/" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-linkedin"></i> linkedin.com/in/kalem-wallace</a></li>
          <li><a href="https://github.com/kalemriah" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-github"></i> github.com/kalemriah</a></li>
          <li><a href="https://instagram.com/kalemalemm" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-instagram"></i> @kalemalemm</a></li>
        </ul>
      </div>
    </div>
  </section>

</body>
</html>
