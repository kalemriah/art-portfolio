<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Kalem Wallace</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/jpeg" href="/images/004.jpg">
</head>
<body class="gallery-page">
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/gallery">Gallery</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <div id="gallery" class="gallery">
        <div class="loading">Loading artworks...</div>
    </div>

    <!-- Lightbox Modal -->
    <div id="modal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modal-img">
        <div class="modal-info">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-details" id="modal-details"></div>
        </div>
    </div>

    <a href="#" class="top-page">↑</a>

    <script>
        async function loadArtworks() {
            try {
                const response = await fetch('/artworks.json');
                const data = await response.json();
                displayArtworks(data.artworks);
            } catch (error) {
                document.getElementById('gallery').innerHTML =
                    '<div class="loading">Error loading artworks.</div>';
            }
        }

        function displayArtworks(artworks) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            const numCols = 3;
            const columns = Array.from({ length: numCols }, () => {
                const col = document.createElement('div');
                col.className = 'gallery-col';
                return col;
            });

            artworks.forEach((artwork, i) => {
                const card = document.createElement('div');
                card.className = 'artwork-card';
                const imagePath = artwork.filelocation + '.jpg';
                card.innerHTML = `
                    <img src="${imagePath}" alt="${artwork.title}" style="cursor: pointer;">
                    <div class="artwork-info">
                        <h3 class="artwork-title">${artwork.title}</h3>
                        <p class="artwork-medium">${artwork.medium || ''}</p>
                    </div>
                `;
                card.querySelector('img').addEventListener('click', () => openModal(artwork, imagePath));
                columns[i % numCols].appendChild(card);
            });

            columns.forEach(col => gallery.appendChild(col));
        }

        function openModal(artwork, imagePath) {
            const modal = document.getElementById('modal');
            modal.style.display = 'block';
            document.getElementById('modal-img').src = imagePath;
            document.getElementById('modal-title').textContent = artwork.title;
            document.getElementById('modal-details').innerHTML =
                artwork.medium ? `<p>${artwork.medium}</p>` : '';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-img');

            document.querySelector('.close-modal').onclick = () => modal.style.display = 'none';
            modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.style.display = 'none'; });
            modalImg.addEventListener('click', (e) => {
                e.stopPropagation();
                modalImg.classList.toggle('zoomed');
            });
        });

        loadArtworks();
    </script>
</body>
</html>
